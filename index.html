<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honoured Inventory | Ascended Aura</title>
    <link href="https://fonts.googleapis.com/css2?family=Finger+Paint&display=swap" rel="stylesheet">
    <style>
        :root { 
            --p: #f00; --s: #5ab9ff; --g: #300; --w: #fff; 
            --c-color: #ffcc00; --sat: 100%;
            --side-bg: rgba(10, 10, 10, 0.85);
        }
        
        * { font-family: 'Finger Paint', cursive !important; box-sizing: border-box; cursor: none; scrollbar-width: none; }
        
        body { 
            background: #000; color: #fff; margin: 0; display: flex; height: 100vh; overflow: hidden; 
            filter: saturate(var(--sat));
            transition: background 0.5s, filter 0.3s;
            background: radial-gradient(circle at 10% 50%, var(--g) 0%, #000 100%); 
        }

        /* SCANLINE EFFECT */
        #crt-overlay {
            position: fixed; inset: 0; pointer-events: none; z-index: 99999;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%; display: none;
        }

        /* CURSOR TRAIL */
        .tr { width: 12px; height: 12px; background: var(--c-color); position: fixed; border-radius: 50%; pointer-events: none; z-index: 100000; transform: translate(-50%, -50%); left: -100px; top: -100px; box-shadow: 0 0 15px var(--c-color); transition: opacity 0.3s; }
        #c { width: 16px; height: 16px; box-shadow: 0 0 25px var(--c-color); z-index: 100001; }
        
        /* SIDEBAR */
        .sd { 
            width: 300px; min-width: 300px; background: var(--side-bg); backdrop-filter: blur(15px);
            padding: 40px 25px; display: flex; flex-direction: column; 
            border-right: 1px solid rgba(255, 0, 0, 0.3); z-index: 100; 
            transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            animation: aura-breathe 4s infinite ease-in-out;
        }
        .sd.hidden { margin-left: -300px; }

        @keyframes aura-breathe {
            0%, 100% { border-right-color: rgba(255, 0, 0, 0.2); }
            50% { border-right-color: rgba(255, 0, 0, 0.6); }
        }

        #m-tog { 
            position: fixed; top: 25px; left: 265px; background: var(--p); color: #fff; border: none; 
            width: 45px; height: 45px; border-radius: 12px; z-index: 1001; box-shadow: 0 0 15px var(--p); transition: 0.5s;
        }
        .sd.hidden #m-tog { left: 15px; border-radius: 50%; }
        
        .st { font-size: 2.2rem; color: #fff; text-transform: uppercase; line-height: 0.9; margin-bottom: 5px; }
        .st span { color: var(--p); text-shadow: 0 0 15px var(--p); }
        .rk { font-size: .75rem; color: var(--c-color); letter-spacing: 4px; text-shadow: 0 0 8px var(--c-color); background: rgba(255, 204, 0, 0.1); padding: 5px 10px; border-radius: 4px; display: inline-block; margin-bottom: 30px;}

        .nb { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); 
            color: #ccc; padding: 15px; text-align: left; margin-bottom: 12px; width: 100%; transition: 0.4s; 
            font-size: 0.85rem; border-radius: 8px; position: relative; overflow: hidden;
        }
        .nb:hover { transform: translateX(10px); border-color: var(--p); color: #fff; background: rgba(255, 255, 255, 0.08); }
        .nb.active { border-color: var(--s); color: var(--s); background: rgba(90, 185, 255, 0.05); }

        /* MAIN CONTENT */
        .mc { flex: 1; padding: 50px 60px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .page { display: none; width: 100%; flex-direction: column; align-items: center; }
        .page.active { display: flex; }
        h1 { font-size: 5rem; margin: 0; color: var(--p); text-shadow: 5px 5px 0 #fff; animation: gl 3s infinite; }

        /* SETTINGS MODAL GRID */
        .mo { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.98); z-index: 1000; justify-content: center; align-items: center; }
        .sc { background: #050505; border: 2px solid var(--p); width: 550px; padding: 35px; box-shadow: 0 0 50px rgba(255,0,0,0.2); border-radius: 20px; max-height: 90vh; overflow-y: auto; }
        
        .s-group { margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #222; }
        .s-label { display: flex; justify-content: space-between; color: var(--s); font-size: 0.8rem; margin-bottom: 10px; text-transform: uppercase; }
        
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 4px; background: #222; border-radius: 5px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: var(--p); border-radius: 50%; box-shadow: 0 0 8px var(--p); }

        .tog-btn { padding: 8px 15px; background: #111; border: 1px solid #333; color: #fff; border-radius: 5px; font-size: 0.7rem; transition: 0.3s; }
        .tog-btn.on { border-color: var(--p); background: rgba(255,0,0,0.1); color: var(--p); }

        @keyframes gl { 0%, 6% { transform: translate(0); } 2% { transform: translate(-3px,3px); text-shadow: 5px 5px 0 #fff,-3px 0 var(--p); } 4% { transform: translate(3px,-3px); text-shadow: 5px 5px 0 #fff,3px 0 var(--s); } }
    </style>
</head>
<body>
    <div id="crt-overlay"></div>
    <div id="c" class="tr"></div>
    <div class="tr pt" style="opacity: 0.6;"></div><div class="tr pt" style="opacity: 0.3;"></div>

    <audio id="bgm" loop><source src="Let It Ride - Anno Domini Beats.mp3"></audio>
    <button id="m-tog" onclick="togSide()">«</button>

    <div class="sd" id="sidebar">
        <div class="st">HONOURED<br><span>INVENTORY</span></div>
        <div class="rk">RANK: HONOURED</div>
        <button class="nb active" onclick="nav('home',this)">HOME</button>
        <button class="nb" onclick="nav('codes',this)">ARSENAL</button>
        <button class="nb" onclick="nav('suggest',this)">THE VAULT</button>
        <button class="nb" onclick="nav('contact',this)">CONTACT</button>
        <button class="nb" style="margin-top:auto; border-color:var(--p); color:var(--p);" onclick="togSet()">SETTINGS ⚙️</button>
    </div>

    <div class="mc">
        <div id="home" class="page active">
            <h1>Home</h1>
            <div style="width: 100%; max-width: 800px; aspect-ratio: 16/9; border: 1px solid var(--p); margin-top: 40px; border-radius: 15px; overflow: hidden;">
                <iframe width="100%" height="100%" src="https://www.youtube.com/embed/7E-KYBDySz8" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
        
        <div id="codes" class="page"><h1>Arsenal</h1><p>Strings loading...</p></div>
        <div id="suggest" class="page"><h1>The Vault</h1><textarea id="s-in" placeholder="Sacrifice text..."></textarea></div>
        <div id="contact" class="page"><h1>Contact</h1><input type="text" placeholder="Subject"></div>
    </div>

    <div class="mo" id="set-mo">
        <div class="sc">
            <h2 style="color:var(--p); margin:0; letter-spacing:3px;">SYSTEM OVERRIDE</h2>
            
            <div class="s-group" style="margin-top:25px;">
                <div class="s-label"><span>Ambient Audio</span><span id="v-val">0%</span></div>
                <input type="range" min="0" max="100" value="0" oninput="setVol(this.value)">
                <div class="s-label" style="margin-top:10px;"><span>Playback Tempo</span><span id="p-val">1.0x</span></div>
                <input type="range" min="5" max="20" value="10" oninput="setPitch(this.value)">
            </div>

            <div class="s-group">
                <div class="s-label"><span>Aura Saturation</span><span id="sat-val">100%</span></div>
                <input type="range" min="0" max="200" value="100" oninput="setSat(this.value)">
            </div>

            <div class="s-group">
                <div class="s-label"><span>Visual Toggles</span></div>
                <div style="display:flex; gap:10px;">
                    <button id="crt-btn" class="tog-btn" onclick="togCRT()">CRT SCANLINES: OFF</button>
                    <button id="trail-btn" class="tog-btn on" onclick="togTrail()">CURSOR TRAIL: ON</button>
                </div>
            </div>

            <div class="s-group">
                <div class="s-label"><span>Primary Aura Color</span></div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <button class="nb" style="margin:0; border-color:#f00; color:#f00;" onclick="setAura('#f00', '#300')">RED</button>
                    <button class="nb" style="margin:0; border-color:#5ab9ff; color:#5ab9ff;" onclick="setAura('#5ab9ff', '#001')">BLUE</button>
                </div>
            </div>

            <button class="nb active" style="text-align:center;" onclick="togSet()">SAVE & CLOSE</button>
        </div>
    </div>

    <script>
        const bgm = document.getElementById('bgm'), side = document.getElementById('sidebar'), sMo = document.getElementById('set-mo'), trs = document.querySelectorAll('.tr'), crt = document.getElementById('crt-overlay');
        let mouse = { x: 0, y: 0 }, trailActive = true;

        function nav(id, b) { 
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); 
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nb').forEach(n => n.classList.remove('active'));
            if(b) b.classList.add('active');
        }

        function togSide() { side.classList.toggle('hidden'); document.getElementById('m-tog').innerText = side.classList.contains('hidden') ? '»' : '«'; }
        function togSet() { sMo.style.display = (sMo.style.display == 'flex') ? 'none' : 'flex'; }

        /* SETTINGS LOGIC */
        function setVol(v) { bgm.volume = v/100; document.getElementById('v-val').innerText = v+"%"; if(v>0 && bgm.paused) bgm.play(); }
        function setPitch(v) { bgm.playbackRate = v/10; document.getElementById('p-val').innerText = (v/10).toFixed(1)+"x"; }
        function setSat(v) { document.documentElement.style.setProperty('--sat', v+'%'); document.getElementById('sat-val').innerText = v+"%"; }
        function setAura(p, g) { document.documentElement.style.setProperty('--p', p); document.body.style.background = `radial-gradient(circle at 10% 50%, ${g} 0%, #000 100%)`; }
        
        function togCRT() { 
            const active = crt.style.display === 'block';
            crt.style.display = active ? 'none' : 'block';
            document.getElementById('crt-btn').innerText = `CRT SCANLINES: ${active ? 'OFF' : 'ON'}`;
            document.getElementById('crt-btn').classList.toggle('on');
        }

        function togTrail() {
            trailActive = !trailActive;
            trs.forEach(t => t.style.opacity = trailActive ? '1' : '0');
            document.getElementById('trail-btn').innerText = `CURSOR TRAIL: ${trailActive ? 'ON' : 'OFF'}`;
            document.getElementById('trail-btn').classList.toggle('on');
        }

        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        function trail() {
            let x = mouse.x, y = mouse.y;
            trs.forEach((t, i) => {
                t.style.left = x + "px"; t.style.top = y + "px";
                x += ((trs[i+1]?.offsetLeft || x) - x) * 0.3; y += ((trs[i+1]?.offsetTop || y) - y) * 0.3;
            });
            requestAnimationFrame(trail);
        }
        trail();
    </script>
</body>
</html>
