<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Arsenal UI Fix</title>
    <style>
        /* This section restores your "Dark Mode" and "Red Glow" */
        body {
            background-color: #050505;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
            margin: 0;
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive; /* Matches your hand-drawn font */
        }

        .ui-container {
            background-color: #000;
            border: 2px solid #ff0000;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
            padding: 25px;
            width: 80%;
            max-width: 800px;
            margin-bottom: 20px;
            position: relative;
            box-sizing: border-box;
        }

        .ui-header {
            color: #33aaff; /* The blue from your screenshot */
            text-transform: uppercase;
            font-size: 24px;
            margin: 0 0 10px 0;
        }

        .ui-description {
            color: #888;
            font-size: 16px;
            margin: 0;
        }

        .view-code-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            background: transparent;
            border: 1px solid #444;
            color: #fff;
            padding: 10px 20px;
            cursor: pointer;
            text-transform: uppercase;
            font-family: inherit;
        }

        .view-code-btn:hover {
            background: #fff;
            color: #000;
        }
    </style>
</head>
<body>

    <div class="ui-container">
        <button class="view-code-btn">VIEW CODE</button>
        <h2 class="ui-header">HEALTH INDICATOR</h2>
        <p class="ui-description">Visual health bar customizer string.</p>
    </div>

    <div class="ui-container">
        <button class="view-code-btn">VIEW CODE</button>
        <h2 class="ui-header">FULL ARSENAL CODE</h2>
        <p class="ui-description">Complete weapon library and combat logic strings.</p>
    </div>

</body>
</html>
