<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honoured Inventory</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Finger+Paint&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: 'Finger Paint', cursive !important;
            box-sizing: border-box;
        }

        body { 
            background-color: #000; 
            color: #fff; 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden;
            /* Suble red glow in the background like Version 1 */
            background: radial-gradient(circle at 20% 50%, #1a0000 0%, #000 100%);
        }

        /* Sidebar Styles */
        .sidebar { 
            width: 240px; 
            background: #050505; 
            padding: 40px 20px; 
            display: flex; 
            flex-direction: column; 
            border-right: 2px solid #FF0000; /* Red Border instead of Grey */
            box-shadow: 5px 0 15px rgba(255, 0, 0, 0.1);
        }

        .sidebar-title { 
            font-size: 1.6rem; 
            margin-bottom: 50px; 
            line-height: 1.1;
            color: #FF0000; 
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
            text-transform: uppercase;
        }

        .nav-btn { 
            background: #000; 
            border: 1px solid #444; 
            color: #fff; 
            padding: 15px; 
            text-align: left; 
            cursor: pointer; 
            margin-bottom: 15px;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        /* The JJS Blue Glow + Red Hover */
        .nav-btn.active { 
            border: 2px solid #5ab9ff !important; 
            box-shadow: 0 0 15px rgba(90, 185, 255, 0.6);
            transform: translateX(10px);
        }

        .nav-btn:hover:not(.active) {
            border-color: #FF0000;
            background: #110000;
        }

        /* Main Content Styling */
        .main-content { 
            flex-grow: 1; 
            padding: 60px; 
            overflow-y: auto; 
        }

        h1 { 
            font-size: 4.5rem; 
            margin: 0 0 10px 0; 
            color: #FF0000; 
            text-shadow: 3px 3px 0px #fff; 
            letter-spacing: -3px;
        }

        p { 
            font-size: 1.4rem; 
            line-height: 1.4; 
            max-width: 900px; 
            color: #fff; 
            margin-bottom: 25px;
        }

        /* YouTube Video - First Version's Heavy Red Frame */
        .video-frame { 
            max-width: 850px; 
            aspect-ratio: 16/9; 
            border: 5px solid #FF0000;
            background: #000;
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.3);
            margin-top: 20px;
        }
        iframe { width: 100%; height: 100%; border: none; }

        /* The guns.lol Button */
        .guns-button {
            display: inline-block;
            margin-top: 30px;
            padding: 20px 50px;
            background: #FF0000;
            color: #fff;
            text-decoration: none;
            font-size: 2rem;
            border: 4px solid #fff;
            transition: 0.3s;
        }
        .guns-button:hover {
            background: #fff;
            color: #FF0000;
            transform: scale(1.05);
        }

        .page { display: none; }
        .page.active { display: block; }

        /* Code Row Styling */
        .code-row {
            background: #111;
            padding: 30px;
            border: 2px solid #FF0000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-title">Honoured<br>Inventory</div>
        <button class="nav-btn active" onclick="showPage('home', this)">Home</button>
        <button class="nav-btn" onclick="showPage('codes', this)">Codes</button>
        <button class="nav-btn" onclick="showPage('movesets', this)">Movesets</button>
        <button class="nav-btn" onclick="showPage('animations', this)">Animations</button>
        <button class="nav-btn" onclick="showPage('contact', this)">Contact</button>
    </div>

    <div class="main-content">
        <div id="home" class="page active">
            <h1>Home</h1>
            <p>Thanks for using the site. Check out the other tabs.</p>
            <p>To use these moves for content, please credit me. For personal use, no credit is needed.</p>
            
            <div class="video-frame">
                <iframe src="https://www.youtube.com/embed/DUqZNqbLF5g" allowfullscreen></iframe>
            </div>
        </div>

        <div id="codes" class="page">
            <h1>Codes</h1>
            <div class="code-row">
                <span style="font-size: 2rem;">JJS_SHENANIGANS</span>
                <button class="nav-btn" style="margin:0; padding: 10px 30px; border-color: #FF0000;" onclick="alert('Copied!')">COPY</button>
            </div>
        </div>

        <div id="contact" class="page">
            <h1>Contact</h1>
            <p>Direct access to all my links:</p>
            <a href="https://guns.lol/azmi" target="_blank" class="guns-button">guns.lol/azmi</a>
        </div>
    </div>

    <script>
        function showPage(pageId, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            btn.classList.add('active');
        }
    </script>
</body>
</html>
